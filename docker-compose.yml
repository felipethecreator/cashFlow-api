version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: cashflow-postgres
    environment:
      POSTGRES_DB: cashflow
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: cashflow123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cashflow-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cashflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cashflow
      RABBITMQ_DEFAULT_PASS: cashflow123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - cashflow-network

  # Mailhog (fake SMTP para dev)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: cashflow-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - cashflow-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  cashflow-network:
    driver: bridge