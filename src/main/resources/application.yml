spring:
  application:
    name: cashflow-api

  # Perfil ativo
  profiles:
    active: dev

  # Database
  datasource:
    url: jdbc:postgresql://localhost:5433/cashflow
    username: cashflow
    password: cashflow123
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: cashflow
    password: cashflow123

  # Email (Mailhog para dev)
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Server
server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: on_param

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# JWT
jwt:
  secret: sua-chave-secreta-super-segura-aqui-minimo-256-bits
  expiration: 86400000 # 24 horas em ms

# Logging
logging:
  level:
    com.cashflow.api: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG